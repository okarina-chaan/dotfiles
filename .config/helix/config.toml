theme = "heisenberg" 

[editor]
true-color = true 
rulers = [80] 
cursorline = true 
color-modes = true 
auto-completion = true 
auto-save = true 
end-of-line-diagnostics = "hint"
auto-pairs = true
completion-replace = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"


[editor.statusline]
left = ["mode", "spinner"]
center = ["file-name"]
right = ["diagnostics", "selections", "position", "file-encoding", "file-line-ending", "file-type"]
separator = "│" 

mode.normal = "♥️"
mode.insert = "✏️"
mode.select = "🐁"

[editor.file-picker]
max-depth = 6 
hidden = false 

[editor.whitespace.render]
space = "all" 
tab = "all"
newline = "all"

[editor.whitespace.characters]
space = "·"
nbsp = "⍽"
tab = "→"
newline = "✔" 

[editor.indent-guides]
render = true 
character = "|" 


[editor.soft-wrap]
enable = true 

max-wrap = 20  
max-indent-retain = 20 
wrap-indicator = ""  

[editor.lsp]
display-inlay-hints = true

[editor.inline-diagnostics]
cursor-line = "warning"

[keys.insert]
j = { j = "normal_mode" } 
C-j = "completion"

[keys.normal]
ret = ["open_below", "normal_mode"] 
backspace = "delete_char_backward" 
tab = ":bn" 
S-tab = ":bp"  
